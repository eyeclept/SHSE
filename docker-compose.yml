services:

  opensearch-init:
    image: busybox
    container_name: opensearch_init
    user: root
    # OpenSearch runs as UID 1000 inside the container; bind-mount dirs created
    # by Docker are owned by root. This init container fixes ownership before
    # OpenSearch starts, so it works on every `docker compose up` without
    # any manual chown on the host.
    command: ["sh", "-c", "mkdir -p /mnt/data && chown -R 1000:1000 /mnt/data"]
    volumes:
      - ./data/opensearch:/mnt/data
    restart: "no"

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch
    restart: unless-stopped
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.seed_hosts=opensearch
      - cluster.initial_master_nodes=opensearch-node
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ports:
      - "9200:9200"
      # - "9600:9600"  # Only needed for Performance Analyzer
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs -u admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD https://localhost:9200 -k || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      opensearch-init:
        condition: service_completed_successfully

  mariadb-init:
    image: busybox
    container_name: mariadb_init
    user: root
    # MariaDB runs as UID 999 (mysql user); fix ownership before MariaDB starts.
    command: ["sh", "-c", "mkdir -p /mnt/data && chown -R 999:999 /mnt/data"]
    volumes:
      - ./data/mariadb:/mnt/data
    restart: "no"

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DB:-shse}
      MYSQL_USER: ${MARIADB_USER:-shse_user}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mariadb-init:
        condition: service_completed_successfully

  # Ollama is already set up on the local host — uncomment if needed
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: flask
    restart: unless-stopped
    env_file: .env
    environment:
      - MARIADB_HOST=mariadb
      - REDIS_HOST=redis
      - OPENSEARCH_HOST=opensearch
      - NUTCH_HOST=nutch
      - NUTCH_PORT=8081
      - LLM_API_BASE=http://host.docker.internal:11434/v1
      - CELERY_BROKER_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: celery_beat
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "celery_worker.app.celery", "beat", "--loglevel=info"]
    env_file: .env
    environment:
      - MARIADB_HOST=mariadb
      - REDIS_HOST=redis
      - OPENSEARCH_HOST=opensearch
      - CELERY_BROKER_URL=redis://redis:6379/0
      - NUTCH_HOST=nutch
      - NUTCH_PORT=8081
      - LLM_API_BASE=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - MARIADB_HOST=mariadb
      - REDIS_HOST=redis
      - OPENSEARCH_HOST=opensearch
      - CELERY_BROKER_URL=redis://redis:6379/0
      - NUTCH_HOST=nutch
      - NUTCH_PORT=8081
      - LLM_API_BASE=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      flask:
        condition: service_healthy

  # Test-only service. Not started during normal stack boot.
  # Start with: docker compose --profile test up kiwix -d
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix
    restart: unless-stopped
    profiles: ["test"]
    ports:
      - "8082:8080"
    volumes:
      - ./wikipedia_en_100_nopic_2026-04.zim:/data/wikipedia_en_100_nopic_2026-04.zim:ro
    command: wikipedia_en_100_nopic_2026-04.zim
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: mcp_server
    restart: unless-stopped
    profiles: ["mcp"]
    command: [".venv/bin/uvicorn", "mcp_server.main:app", "--host", "0.0.0.0", "--port", "8765"]
    env_file: .env
    environment:
      - OPENSEARCH_HOST=opensearch
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8765/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      opensearch:
        condition: service_healthy

  nutch:
    # Pinned to the last build that ships the REST server (startserver command).
    # apache/nutch:latest pulled after 2026-05-03 removed the REST module from
    # the ant runtime build. Do NOT change to :latest or docker compose pull
    # will overwrite this with a broken image.
    image: apache/nutch@sha256:f6d1e4e7e9e7259bf3ce1435640d4b908494e9204321ac7fccbfd578bee9343b
    container_name: nutch
    restart: unless-stopped
    command: ["/bin/sh", "-c", "/root/nutch_source/runtime/local/bin/nutch startserver -host 0.0.0.0 -port 8081"]
    volumes:
      - ./data/nutch:/nutch_data
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/admin/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      opensearch:
        condition: service_healthy

# All persistent data is stored under ./data/ as bind mounts.
# No named volumes declared.