# SHSE — Non-secret configuration
# Secrets (passwords, keys, tokens) live in .env — never here.
# This file is gitignored. Copy config.ini.example and fill in your values.

[mariadb]
host = 172.27.72.57
port = 3306
db   = shse
user = shse_user

[opensearch]
host = 172.27.72.57
port = 9200
user = admin

[redis]
host = 172.27.72.57
port = 6379

[nutch]
host = 172.27.72.57
port = 8081

[llm]
api_base        = http://172.27.72.49:11434/v1
embed_model     = nomic-embed-text
gen_model       = granite4.1:8b
rewrite_model   = granite4.1:3b
translate_model = aya-expanse:8b
query_rewrite   = false
cpu_fallback    = false

[stardict]
dict_path = /app/dicts

[tls]
internal_verify = true

[sso]
enabled      = false
provider_url =
client_id    =
admin_group  = admin
local_auth   = true

[webauthn]
rp_id   = localhost
rp_name = SHSE
origin  = http://localhost:5000

[smtp]
host = 172.27.72.57
port = 1025
user =
from = noreply@shse.local
tls  = false

[app]
url = http://localhost:5000

[mcp]
host     = 0.0.0.0
port     = 8765
result_k = 10

[ratelimit]
; Login attempts per IP per minute. Raise for dev/test; keep low for production.
login = 60 per minute
