# SHSE — Non-secret configuration
# Secrets (passwords, keys, tokens) live in .env — never here.
# Docker services override individual keys via their environment: blocks.

[mariadb]
host = localhost
port = 3306
db   = shse
user = shse_user

[opensearch]
host = localhost
port = 9200
user = admin

[redis]
host = localhost
port = 6379

[nutch]
host = localhost
port = 8081

[llm]
api_base            = http://localhost:11434/v1
embed_model         = nomic-embed-text
gen_model           = granite4.1:8b
rewrite_model       = granite4.1:3b
translate_model     = aya-expanse:8b
query_rewrite       = false

[stardict]
dict_path = /app/dicts

[tls]
internal_verify = true

[sso]
enabled          = false
provider_url     =
client_id        =
admin_group      = admin
local_auth       = true

[webauthn]
rp_id   = localhost
rp_name = SHSE
origin  = http://localhost:5000

[smtp]
host =
port = 587
user =
from = noreply@example.com
tls  = true

[app]
url = http://localhost:5000

[mcp]
host     = 0.0.0.0
port     = 8765
result_k = 10
