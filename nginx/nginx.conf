server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Internal auth-check sub-request endpoint. Nginx sends a request here
    # before proxying any /admin/* request; Flask returns 200 for admins, 403
    # otherwise. The Cookie header is forwarded so Flask-Login can read the session.
    location = /api/admin-check {
        internal;
        proxy_pass              http://flask:5000/api/admin-check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
    }

    # /admin/* — defence-in-depth restriction at the proxy layer.
    # Flask also enforces this via @admin_required; Nginx is a second layer.
    location /admin {
        auth_request /api/admin-check;
        error_page 403 = @admin_forbidden;

        proxy_pass         http://flask:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Cookie $http_cookie;
    }

    location @admin_forbidden {
        return 403 "Access denied";
    }

    location / {
        proxy_pass         http://flask:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
